<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Weather</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Product+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body class="onyx-dark">
    <div id="parallax-container"><img src="assets/backdrops/backdrop.png" id="backdrop"></div>

    <header class="pixel-header">
        <div class="nav-btn">←</div>
        <div id="city-name" class="city-title">Chicago</div>
        <div class="nav-btn">⋮</div>
    </header>

    <main id="app">
        <div class="search-section">
            <input type="text" id="global-search" class="search-bar" placeholder="Search for city or zip..." autocomplete="off">
            <div id="results" class="search-results"></div>
        </div>
        <div id="weather-view"></div>
    </main>

    <nav class="pill-nav-container">
        <div class="pill-nav">
            <button class="tab-btn active" data-tab="current">Current</button>
            <button class="tab-btn" data-tab="hourly">Hourly</button>
            <button class="tab-btn" data-tab="weekly">7-Day</button>
            <button class="tab-btn" data-tab="saved">Saved</button>
            <button class="tab-btn" data-tab="radar">Radar</button>
        </div>
    </nav>

    <script src="locations.js"></script>
    <script src="js/nws.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
